<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RMS Prototype - Đại học Thủy Lợi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Icon set (Feather Icons for wireframe look) -->
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
    <div class="app-container">
        <!-- Top Navigation -->
        <header class="topbar">
            <div class="logo">
                <div class="logo-box">TLU</div>
                <span class="logo-text">RMS Wireframe <small style="font-weight:400;color:#888;font-size:12px">· demo cho DEV</small></span>
            </div>
            
            <div class="role-switcher">
                <label for="role-select">Góc nhìn (Role):</label>
                <select id="role-select" onchange="switchRole(this.value)">
                    <option value="admin">Quản trị viên (Phòng KHCN)</option>
                    <option value="lecturer">Giảng viên / Nhà nghiên cứu</option>
                    <option value="student">Sinh viên</option>
                </select>
            </div>

            <div class="user-profile">
                <i data-feather="bell" class="icon"></i>
                <div class="avatar" id="user-avatar">AD</div>
                <span id="user-name">Nguyễn Văn A (Admin)</span>
            </div>
        </header>

        <div class="main-layout">
            <!-- Sidebar Navigation -->
            <aside class="sidebar">
                <ul class="nav-list" id="sidebar-nav">
                    <!-- Nav items will be injected by JS based on Role -->
                </ul>
            </aside>

            <!-- Main Content Area -->
            <main class="content-area">
                <div class="content-header">
                    <h1 id="page-title">Trang chủ (Tổng quan)</h1>
                    <div class="breadcrumbs">Hệ thống > <span id="breadcrumb-current">Trang chủ</span></div>
                </div>

                <div class="content-body" id="content-body">
                    <!-- Content will be injected by JS -->
                </div>
            </main>
        </div>
    </div>

    <!-- Modal cho form đăng ký -->
    <div class="modal-overlay" id="modal-overlay" onclick="closeModal()"></div>
    <div class="modal" id="demo-modal">
        <div class="modal-header">
            <h2 id="modal-title">Tiêu đề Modal</h2>
            <button class="btn-close" onclick="closeModal()"><i data-feather="x"></i></button>
        </div>
        <div class="modal-body" id="modal-body">
            <!-- Form content -->
        </div>
        <div class="modal-footer">
            <button class="btn btn-outline" onclick="closeModal()">Hủy</button>
            <button class="btn btn-primary" onclick="closeModal()">Lưu & Xác nhận</button>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        feather.replace();
    </script>
</body>
</html>
